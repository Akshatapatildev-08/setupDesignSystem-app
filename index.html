<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Job Notification App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,600;6..72,700&family=Manrope:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="top-nav" role="banner">

      <button

        type="button"
        aria-label="Toggle navigation menu"
        aria-expanded="false"

        <span></span>
        <span></span>
      </button>

      <nav class="desktop-nav" aria-label="Primary navigation">
        <a href="/dashboard" data-route>Dashboard</a>

        <a href="/settings" data-route>Settings</a>
        <a href="/proof" data-route>Proof</a>
      </nav>

      <nav id="mobile-nav" class="mobile-nav" aria-label="Mobile navigation" hidden>
        <a href="/dashboard" data-route>Dashboard</a>
        <a href="/saved" data-route>Saved</a>
        <a href="/digest" data-route>Digest</a>
        <a href="/settings" data-route>Settings</a>
        <a href="/proof" data-route>Proof</a>

  <script src="./app.js" defer></script>

</html>
